<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Crack | Daily Homework & Imp Questions</title>
    <style>
        :root {
            --bg: #03001e;
            --primary: #facc15; 
            --secondary: #ec4899; 
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-x: hidden; }
        body::before { content: ''; position: fixed; width: 200px; height: 200px; background: rgba(236, 72, 153, 0.4); filter: blur(100px); top: 10%; left: 10%; }
        body::after { content: ''; position: fixed; width: 200px; height: 200px; background: rgba(250, 204, 21, 0.3); filter: blur(100px); bottom: 10%; right: 10%; }

        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, var(--secondary), var(--primary), var(--secondary)); }

        h1 { font-size: 3.5rem; font-weight: 800; color: var(--text); text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .quote-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 40px; border-left: 4px solid var(--secondary); }
        p.moto { font-style: italic; color: #cbd5e1; font-size: 1.1rem; }

        .section-title { font-size: 1.5rem; text-align: left; margin-bottom: 15px; color: #facc15; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        .btn-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .btn { position: relative; background: rgba(255, 255, 255, 0.05); color: var(--text); padding: 25px; text-decoration: none; border-radius: 20px; font-weight: 700; font-size: 1.2rem; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s ease; display: flex; align-items: center; justify-content: center; gap: 15px; }
        
        .btn:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); transform: translateY(-5px); background: rgba(250, 204, 21, 0.1); }
        .btn.daily:hover { border-color: #22d3ee; box-shadow: 0 0 20px #22d3ee; background: rgba(34, 211, 238, 0.1); }

        .update-tag { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        footer { margin-top: 50px; color: #64748b; font-size: 0.9rem; letter-spacing: 1px; }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>🚀 10th Crack</h1>
        <div class="quote-box">
            <p class="moto">Board Exams ko fodna hai, 95%+ laakar record todna hai! 🔥</p>
        </div>

        <h2 class="section-title">📅 Daily Updates</h2>
        <div class="btn-group">
            <a href="#" class="btn daily">
                <span class="update-tag">New</span>
                <span>📝</span> Today's Homework
            </a>
            <a href="#" class="btn daily">
                <span class="update-tag">Live</span>
                <span>🔥</span> Daily Important Questions
            </a>
            <a href="#" class="btn daily">
                <span>📚</span> Study Material Hub
            </a>
        </div>

        <footer>Made for Toppers | 10th Crack 2026-27</footer>
    </div>
</body>
</html>
