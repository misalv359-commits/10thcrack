<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Crack | Mission 95%+</title>
    <style>
        :root { --bg: #03001e; --primary: #facc15; --secondary: #ec4899; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }

        .container {
            position: relative; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1); padding: 40px 20px; border-radius: 30px;
            text-align: center; max-width: 480px; width: 100%; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            margin-top: 20px; z-index: 10;
        }

        h1 { font-size: 2.2rem; font-weight: 800; color: var(--text); text-shadow: 0 0 15px var(--primary); margin-bottom: 25px; text-transform: uppercase; }
        
        /* Badi Yellow Heading */
        .subject-title { color: var(--primary); font-size: 1.8rem; font-weight: 800; text-transform: uppercase; margin: 25px 0 15px; border-bottom: 2px solid var(--primary); padding-bottom: 5px; display: inline-block; }
        
        /* Cyan Sub-Headings for Science/SST sections */
        .sub-title { color: #22d3ee; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; margin: 20px 0 10px; text-align: left; padding-left: 10px; border-left: 3px solid #22d3ee; }

        .section { display: none; width: 100%; }
        .section.active { display: block !important; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Professional Main Buttons */
        .btn { display: block; background: rgba(255, 255, 255, 0.08); color: var(--text); padding: 18px; margin: 12px 0; text-decoration: none; border-radius: 15px; font-weight: 700; font-size: 1rem; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; cursor: pointer; width: 100%; text-align: center; }
        .btn:active { transform: scale(0.97); background: rgba(250, 204, 21, 0.2); }
        .btn:hover { border-color: var(--primary); background: rgba(255, 255, 255, 0.15); }
        
        /* Chapters list - Professional White Style */
        .chapter-btn { background: none; border: 1px solid rgba(255,255,255,0.15); color: #fff; text-align: left; padding: 16px; margin: 8px 0; font-size: 1rem; font-weight: 500; border-radius: 12px; display: flex; align-items: center; }
        .chapter-btn:hover { background: rgba(255,255,255,0.05); border-color: #fff; box-shadow: 0 4px 15px rgba(255,255,255,0.05); }

        .back-btn { background: var(--secondary); padding: 12px 25px; font-size: 0.85rem; border-radius: 12px; margin: 25px auto 0; display: inline-block; cursor: pointer; font-weight: bold; border: none; color: white; }

        /* Material Content Popup */
        #popupOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); z-index: 10000; justify-content: center; align-items: center; }
        .popup { background: #111; border: 2px solid var(--primary); padding: 35px; border-radius: 25px; width: 85%; max-width: 340px; text-align: center; }

        footer { margin-top: 40px; color: #64748b; font-size: 0.75rem; padding-bottom: 20px; }
    </style>
</head>
<body>

<div id="popupOverlay" onclick="closePopup()">

        <p style="font-size: 1.3rem; font-weight: bold; color: #fff; margin-bottom: 20px;">Oye Ladle! 👻<br><br>Content is being uploaded...<br>Tab tak tu padhai krle ladle 👻</p>
        <button class="btn" style="background: var(--primary); color: #000; border:none;" onclick="closePopup()">Ok Bhai!</button>
