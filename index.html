<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Crack | Mission 95%+</title>
    <style>
        :root { --bg: #03001e; --primary: #facc15; --secondary: #ec4899; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; overflow-x: hidden; }
        body::before { content: ''; position: fixed; width: 300px; height: 300px; background: rgba(236, 72, 153, 0.4); filter: blur(100px); top: 10%; left: 10%; z-index: -1; }
        body::after { content: ''; position: fixed; width: 300px; height: 300px; background: rgba(250, 204, 21, 0.3); filter: blur(100px); bottom: 10%; right: 10%; z-index: -1; }

        .container {
            position: relative; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1); padding: 40px 20px; border-radius: 30px;
            text-align: center; max-width: 450px; width: 100%; box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            margin-top: 20px; z-index: 5;
        }
        .container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, var(--secondary), var(--primary), var(--secondary)); }

        h1 { font-size: 2.8rem; font-weight: 800; color: var(--text); text-shadow: 0 0 15px var(--primary); margin-bottom: 10px; text-transform: uppercase; }
        h2 { color: var(--primary); margin: 20px 0; font-size: 1.4rem; text-transform: uppercase; }
        
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn { display: block; background: rgba(255, 255, 255, 0.1); color: var(--text); padding: 18px; margin: 12px 0; text-decoration: none; border-radius: 15px; font-weight: 700; font-size: 1rem; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s ease; cursor: pointer; width: 100%; text-align: center; position: relative; z-index: 10; }
        .btn:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); transform: translateY(-3px); background: rgba(250, 204, 21, 0.1); }
        
        .back-btn { background: var(--secondary); padding: 10px 20px; font-size: 0.8rem; border-radius: 10px; margin: 20px auto 0; display: inline-block; cursor: pointer; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .chapter-btn { font-size: 0.8rem; padding: 12px 5px; min-height: 55px; display: flex; align-items: center; justify-content: center; }

        /* FIX: Overlay pointer-events manage kiye hain */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; justify-content: center; align-items: center; padding: 20px; pointer-events: none; }
        .overlay.active { display: flex; pointer-events: auto; }
        
        .popup { background: rgba(255, 255, 255, 0.1); border: 2px solid var(--primary); padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 0 30px var(--primary); }
        .popup p { font-size: 1.3rem; font-weight: bold; color: #fff; line-height: 1.5; }

        footer { margin-top: 40px; color: #64748b; font-size: 0.8rem; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="overlay" id="popupOverlay">

            <button class="btn chapter-btn" onclick="show('hub-coming-soon')">14. Statistics</button>

        <button class="btn chapter-btn" onclick="show('hub-sci-common')">Metals & Non-metals</button>

        <button class="btn chapter-btn" onclick="show('hub-sci-common')">Life Processes</button>
